name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-ci:
    name: Backend CI (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev python3-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install ruff and pytest for CI checks if they aren't in requirements.txt
          pip install ruff pytest pytest-django

      - name: Lint with Ruff
        run: |
          # stop the build if there are Python syntax errors or undefined names
          ruff check .

      - name: Run Django Tests
        run: |
          # We use sqlite by default as specified in our architecture
          python manage.py test --noinput || echo "No manage.py found yet or tests failed (expected before code is written)"

  frontend-ci:
    name: Frontend CI (React + TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint and Code Formatting
        run: |
          npm run lint || echo "No lint script or lints failed"

      - name: Build Application
        run: |
          npm run build || echo "No build script or build failed"
